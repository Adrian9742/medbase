<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedBase — Resultado</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/componentes.css" />
  <!-- Lucide Icons — obrigatório antes dos scripts que chamam lucide.createIcons() -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Config — aplica tema antes de renderizar -->
  <script src="js/config.js"></script>
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="logo">
        <div class="logo__icone"><i data-lucide="stethoscope"></i></div>
        <span class="logo__nome">Med<span>Base</span></span>
      </a>
      <nav class="header__nav">
        <a href="index.html">Início</a>
        <a href="index.html#secoes">Módulos</a>
        <a href="historico.html">Histórico</a>
      </nav>
      <div style="display:flex; align-items:center; gap:8px;">
        <a href="index.html" class="btn-externo">
          <i data-lucide="arrow-left"></i> Nova busca
        </a>
        <button class="tema-toggle" id="temaToggle" title="Alternar tema">
          <i data-lucide="sun" id="icone-claro" class="oculto"></i>
          <i data-lucide="moon" id="icone-escuro"></i>
        </button>
      </div>
    </div>
  </header>

  <main style="padding: 40px 0 80px;">
    <div class="container--estreito">

      <!-- Skeleton loading -->
      <div id="loading" class="skeleton-card">
        <div class="skeleton-card__topo">
          <div class="skeleton-card__info">
            <span class="skeleton skeleton--badge"></span>
            <span class="skeleton skeleton--titulo"></span>
            <span class="skeleton skeleton--sub"></span>
          </div>
          <div class="skeleton skeleton--imagem"></div>
        </div>
        <span class="skeleton skeleton--texto"></span>
        <span class="skeleton skeleton--texto"></span>
        <span class="skeleton skeleton--texto skeleton--texto-curto"></span>
        <span class="skeleton skeleton--texto"></span>
        <span class="skeleton skeleton--texto skeleton--texto-curto"></span>
      </div>

      <!-- Erro -->
      <div id="erro" class="erro-card oculto">
        <div class="erro-card__icone"><i data-lucide="triangle-alert"></i></div>
        <p class="erro-card__titulo">Não encontrado</p>
        <p class="erro-card__mensagem" id="erroMensagem"></p>
        <button class="erro-card__btn" onclick="window.location.href='index.html'">
          Tentar novamente
        </button>
      </div>

      <!-- Resultado: Fórmula -->
      <div id="resultadoFormula" class="resultado-card oculto">
        <div class="resultado-card__topo">
          <div class="resultado-card__info">
            <span class="badge badge--verde">
              <i data-lucide="flask-conical"></i> Fórmula Química
            </span>
            <h1 class="resultado-card__nome" id="f-nome"></h1>
            <p class="resultado-card__formula mono" id="f-formula"></p>
          </div>
          <img class="resultado-card__imagem" id="f-imagem" src="" alt="Estrutura molecular" />
        </div>

        <table class="tabela-props">
          <tr><td>Fórmula</td><td class="mono" id="f-formula-tabela"></td></tr>
          <tr><td>Peso molecular</td><td id="f-peso"></td></tr>
          <tr><td>CID PubChem</td><td class="mono" id="f-cid"></td></tr>
        </table>

        <div class="sinonimos" id="f-sinonimos"></div>

        <div class="resultado-card__rodape">
          <a id="f-link" href="#" target="_blank" class="btn-externo">
            <i data-lucide="external-link"></i> Ver no PubChem
          </a>
        </div>
      </div>

      <!-- Resultado: Medicamento -->
      <div id="resultadoMedicamento" class="resultado-card oculto">
        <div class="resultado-card__topo">
          <div class="resultado-card__info">
            <span class="badge badge--azul">
              <i data-lucide="pill"></i> Medicamento
            </span>
            <h1 class="resultado-card__nome" id="m-nome"></h1>
            <p class="texto-suave" style="font-size:0.9rem;" id="m-fabricante"></p>
          </div>
        </div>

        <div class="accordion" id="acc-indicacoes">
          <button class="accordion__cabecalho">
            <span class="accordion__titulo">
              <i data-lucide="clipboard-list"></i> Indicações de uso
            </span>
            <span class="accordion__seta">▼</span>
          </button>
          <div class="accordion__conteudo"><p id="m-indicacoes"></p></div>
        </div>

        <div class="accordion" id="acc-dosagem">
          <button class="accordion__cabecalho">
            <span class="accordion__titulo">
              <i data-lucide="syringe"></i> Dosagem
            </span>
            <span class="accordion__seta">▼</span>
          </button>
          <div class="accordion__conteudo"><p id="m-dosagem"></p></div>
        </div>

        <div class="accordion" id="acc-avisos">
          <button class="accordion__cabecalho">
            <span class="accordion__titulo">
              <i data-lucide="triangle-alert"></i> Avisos
            </span>
            <span class="accordion__seta">▼</span>
          </button>
          <div class="accordion__conteudo"><p id="m-avisos"></p></div>
        </div>

        <div class="accordion" id="acc-contraindicacoes">
          <button class="accordion__cabecalho">
            <span class="accordion__titulo">
              <i data-lucide="ban"></i> Contraindicações
            </span>
            <span class="accordion__seta">▼</span>
          </button>
          <div class="accordion__conteudo"><p id="m-contraindicacoes"></p></div>
        </div>

        <div class="accordion" id="acc-efeitos">
          <button class="accordion__cabecalho">
            <span class="accordion__titulo">
              <i data-lucide="zap"></i> Efeitos adversos
            </span>
            <span class="accordion__seta">▼</span>
          </button>
          <div class="accordion__conteudo"><p id="m-efeitos"></p></div>
        </div>

        <div class="resultado-card__rodape">
          <a href="https://www.fda.gov" target="_blank" class="btn-externo">
            <i data-lucide="external-link"></i> Ver na FDA
          </a>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>MedBase · Dados: PubChem, OpenFDA · Projeto de portfólio</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/resultado.js"></script>
  <script>
    lucide.createIcons()
    const temaToggle  = document.getElementById("temaToggle")
    const iconeClaro  = document.getElementById("icone-claro")
    const iconeEscuro = document.getElementById("icone-escuro")
    function sincronizarIconeTema() {
      const tema = document.documentElement.getAttribute("data-theme")
      iconeClaro.classList.toggle("oculto", tema !== "light")
      iconeEscuro.classList.toggle("oculto", tema === "light")
    }
    temaToggle.addEventListener("click", () => {
      const novo = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light"
      document.documentElement.setAttribute("data-theme", novo)
      localStorage.setItem("medbase_tema", novo)
      sincronizarIconeTema()
      lucide.createIcons()
    })
    sincronizarIconeTema()
  </script>
</body>
</html>
